name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        working-directory: .github/scripts
        run: npm install

      - name: Start local server
        run: python3 -m http.server 8080 &

      - name: Wait for server
        run: curl --retry 10 --retry-delay 1 --retry-connrefused -s http://localhost:8080 > /dev/null

      - name: Validate
        run: node .github/scripts/validate.js
