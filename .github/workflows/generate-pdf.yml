name: Generate PDF

on:
  push:
    branches: [main]
    # Avoid infinite loop: committing resume.pdf would re-trigger this workflow
    paths-ignore: [resume.pdf]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        working-directory: .github/scripts
        run: npm install

      # Serve the repo root over HTTP so Puppeteer loads index.html as a real
      # webpage — required for Google Fonts and @media print rules to work
      # correctly. The & runs the server in the background so the step exits.
      - name: Start local server
        run: python3 -m http.server 8080 &

      # Poll until the server responds rather than sleeping a fixed duration.
      # --retry-connrefused retries on connection refused (server not up yet).
      # Fails fast if the server never starts within the retry window.
      - name: Wait for server
        run: curl --retry 10 --retry-delay 1 --retry-connrefused -s http://localhost:8080 > /dev/null

      # Puppeteer launches headless Chromium, navigates to localhost:8080
      # (which serves index.html), waits for network idle so Google Fonts
      # fully load, then prints the page to resume.pdf in the repo root.
      - name: Generate PDF
        run: node .github/scripts/generate-pdf.js

      # Commit resume.pdf back to the repo. The diff check prevents an empty
      # commit when the PDF content hasn't changed.
      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.pdf
          git diff --staged --quiet || git commit -m "chore: regenerate resume.pdf"
          git push
